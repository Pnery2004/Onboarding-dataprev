<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Conexão API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Teste de Conexão com a API</h1>
    <p>Clique no botão abaixo para testar a conexão com o backend:</p>
    <button onclick="testarAPI()">Testar Conexão</button>
    <div id="resultado"></div>

    <script>
        async function testarAPI() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = '<p>Testando conexão...</p>';

            try {
                const response = await fetch('http://localhost:8080/api/v1/beneficiarios');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                resultado.innerHTML = `
                    <div class="result success">
                        <h3>✓ Conexão bem-sucedida!</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Beneficiários encontrados:</strong> ${data.length}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultado.innerHTML = `
                    <div class="result error">
                        <h3>✗ Erro na conexão</h3>
                        <p><strong>Mensagem:</strong> ${error.message}</p>
                        <p><strong>Detalhes:</strong> ${error.toString()}</p>
                        <p>Verifique se:</p>
                        <ul>
                            <li>O backend está rodando em http://localhost:8080</li>
                            <li>CORS está configurado corretamente</li>
                            <li>Não há firewall bloqueando a conexão</li>
                        </ul>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
