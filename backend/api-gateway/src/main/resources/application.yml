server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Allow-Origin, RETAIN_FIRST
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${FRONTEND_ORIGIN:http://localhost:3000}"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: beneficiarios-service
          uri: lb://beneficiarios-service
          predicates:
            - Path=/api/v1/beneficiarios/**
        - id: consulta-service
          uri: lb://consulta-service
          predicates:
            - Path=/api/v1/consultas/**
        - id: beneficiarios-openapi
          uri: lb://beneficiarios-service
          predicates:
            - Path=/api-docs/beneficiarios
          filters:
            - SetPath=/api-docs
        - id: consulta-openapi
          uri: lb://consulta-service
          predicates:
            - Path=/api-docs/consulta
          filters:
            - SetPath=/api-docs

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: Beneficiarios Service
        url: /api-docs/beneficiarios
      - name: Consulta Service
        url: /api-docs/consulta

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    org.springframework.cloud.gateway: INFO

